services:
  - type: web
    name: crypto-secure-backend
    env: docker
    plan: free
    startCommand: ""
    envVars:
      - key: APP_NAME
        value: CryptoSecure
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      # Set these manually in Render dashboard after deploying:
      - key: APP_URL
        sync: false
      - key: APP_FRONTEND_URL
        sync: false
      # From Clever Cloud MySQL add-on:
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      # File-based (no Redis needed)
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_DRIVER
        value: file
      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: noreply@cryptosecure.app
      - key: MAIL_FROM_NAME
        value: CryptoSecure
